{% extends "base.html" %}

{% block title %}Password aggiornata{% endblock %}

{% block content %}

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5 text-center">

                    <h2 class="mb-3" style="font-family: 'Playfair Display', serif;">
                        Password aggiornata
                    </h2>

                    <p class="text-muted mb-4">
                        La tua password è stata reimpostata correttamente.
                        Ora puoi accedere con le nuove credenziali.
                    </p>

                    <a href="{% url 'accounts:login' %}" class="btn btn-dark btn-block">
                        Vai al login
                    </a>

                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
