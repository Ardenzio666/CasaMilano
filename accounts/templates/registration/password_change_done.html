{% extends 'base.html' %}
{% load static %}

{% block title %}Password aggiornata - Casa Milano{% endblock %}

{% block content %}

<section class="login-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <div class="card border-0 shadow-custom login-card">
                    <div class="card-body p-4 p-lg-5 text-center">

                        <!-- HEADER -->
                        <span class="section-kicker">Casa Milano</span>
                        <h1 class="font-weight-bold mb-3">Password aggiornata</h1>
                        <div class="bottom_line mx-auto" style="width: 140px; height: 2.5px;"></div>

                        <p class="text-muted mt-4 mb-4">
                            La tua password è stata aggiornata correttamente.
                        </p>

                        <!-- ACTION -->
                        <a href="{% url 'homepage:home' %}" class="btn btn-login btn-block">
                            Torna alla home
                        </a>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
