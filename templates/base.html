{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{% static 'homepage/img/favicon.ico' %}" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
    crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'base/css/style.css' %}">
  <link rel="stylesheet" href="{% static 'base/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'homepage/css/home.css' %}">
  <link rel="stylesheet" href="{% static 'chisiamo/css/chisiamo.css' %}">
  <link rel="stylesheet" href="{% static 'menu/css/menu.css' %}">
  <link rel="stylesheet" href="{% static 'dovetrovarci/css/dovetrovarci.css' %}">
  <link rel="stylesheet" href="{% static 'contatti/css/contatti.css' %}">
  <title>{% block title %}{% endblock %}</title>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light fixed-top py-1 shadow" id="main-nav">
    <div class="container">

      <a href="{% url 'homepage:home' %}" class="navbar-brand d-flex align-items-center">
        <img src="{% static 'homepage/img/logo.png' %}" alt="Casa Milano" height="40" class="mr-2">
        <span class="font-weight-bold">Casa Milano</span>
      </a>

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse"
              aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a href="{% url 'chisiamo:chisiamo' %}" class="nav-link text-dark">Chi siamo</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'menu:menu' %}" class="nav-link text-dark">I nostri menù</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'dovetrovarci:dovetrovarci' %}" class="nav-link text-dark">Dove trovarci</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'contatti:contatti' %}" class="nav-link text-dark">Contatti</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'eventi:eventi' %}" class="nav-link text-dark">Eventi</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>
  <div class="container py-5 mt-5">
  {% block content %}
  {% endblock content %}
  </div>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
    integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
    integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
    integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
    crossorigin="anonymous"></script>
 <script src="{% static 'homepage/js/script.js' %}"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var swiper = new Swiper(".suggestioniSwiper", {
      // Mobile view
      slidesPerView: 1,
      spaceBetween: 20,
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      // Breakpoints control when to switch from mobile to desktop view and viceversa
      breakpoints: {
        768: {
          slidesPerView: 3,
          spaceBetween: 30,
        }
      }
    });
  });
</script>
</body>
</html>
